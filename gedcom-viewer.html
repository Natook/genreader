<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEDCOM Viewer - Svedström Family Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .search-box {
            margin-bottom: 30px;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: border-color 0.3s;
        }

        #searchInput:focus {
            outline: none;
            border-color: #667eea;
        }

        .person-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .person-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: #fafafa;
            transition: all 0.3s;
            cursor: pointer;
        }

        .person-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            background: white;
        }

        .person-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .person-info {
            color: #666;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .person-info strong {
            color: #444;
        }

        .gender-icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-left: 8px;
            vertical-align: middle;
        }

        .gender-M {
            background: #4A90E2;
        }

        .gender-F {
            background: #E24A90;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
            color: #666;
        }

        .no-results {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 1.1em;
        }

        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .detail-modal.active {
            display: flex;
        }

        .detail-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            background: none;
            border: none;
        }

        .close-btn:hover {
            color: #333;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🌳 Svedström Family Tree</h1>
        <p class="subtitle">GEDCOM Viewer</p>

        <div class="search-box" id="fileInputContainer" style="text-align: center; padding: 40px;">
            <input type="file" id="fileInput" accept=".ged" style="display: none;">
            <button onclick="document.getElementById('fileInput').click()"
                style="padding: 15px 30px; font-size: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                📁 Select GEDCOM File
            </button>
            <p style="margin-top: 15px; color: #666;">Choose your .ged file to view your family tree</p>
        </div>

        <div class="search-box" id="searchContainer" style="display: none;">
            <input type="text" id="searchInput" placeholder="Search by name...">
        </div>

        <div class="person-list" id="personList">
            <div class="loading">Loading GEDCOM file...</div>
        </div>
    </div>

    <div class="detail-modal" id="detailModal">
        <div class="detail-content" id="detailContent">
            <button class="close-btn" onclick="closeDetail()">&times;</button>
            <div id="detailBody"></div>
        </div>
    </div>

    <script>
        let allPersons = [];
        let filteredPersons = [];

        // Handle file selection
        document.getElementById('fileInput').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('personList').innerHTML = '<div class="loading">Loading GEDCOM file...</div>';
                const reader = new FileReader();
                reader.onload = function (event) {
                    parseGedcom(event.target.result);
                    document.getElementById('fileInputContainer').style.display = 'none';
                    document.getElementById('searchContainer').style.display = 'block';
                };
                reader.readAsText(file);
            }
        });

        function parseGedcom(text) {
            const lines = text.split('\n');
            const individuals = {};
            const families = {};

            let currentEntity = null;
            let currentType = null;
            let currentTag = null;
            let currentNote = null;

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                const parts = line.split(' ');
                const level = parseInt(parts[0]);
                const tag = parts[1];
                const value = parts.slice(2).join(' ');

                if (level === 0) {
                    if (tag.startsWith('@') && tag.endsWith('@')) {
                        currentEntity = tag;
                        currentType = parts[2];

                        if (currentType === 'INDI') {
                            individuals[currentEntity] = {
                                id: currentEntity,
                                name: '',
                                givenName: '',
                                surname: '',
                                sex: '',
                                birth: { date: '', place: '' },
                                death: { date: '', place: '' },
                                families: [],
                                parentFamily: null,
                                notes: []
                            };
                        } else if (currentType === 'FAM') {
                            families[currentEntity] = {
                                id: currentEntity,
                                husband: '',
                                wife: '',
                                children: []
                            };
                        }
                    }
                    currentTag = null;
                } else if (level === 1 && currentEntity) {
                    // Save previous note if switching tags
                    if (currentNote !== null && tag !== 'CONC' && tag !== 'CONT') {
                        if (currentType === 'INDI') {
                            let cleanNote = currentNote.replace(/<[^>]*>/g, ' ').replace(/&nbsp;/g, ' ').replace(/&ouml;/g, 'ö').replace(/&aring;/g, 'å').replace(/&auml;/g, 'ä').replace(/&Ouml;/g, 'Ö').replace(/&Aring;/g, 'Å').replace(/&Auml;/g, 'Ä').replace(/&ndash;/g, '–').replace(/&amp;/g, '&').trim();
                            if (cleanNote) {
                                individuals[currentEntity].notes.push(cleanNote);
                            }
                        }
                        currentNote = null;
                    }

                    currentTag = tag;

                    if (currentType === 'INDI') {
                        if (tag === 'NAME') {
                            individuals[currentEntity].name = value.replace(/\//g, '');
                        } else if (tag === 'SEX') {
                            individuals[currentEntity].sex = value;
                        } else if (tag === 'NOTE') {
                            currentNote = value;
                        } else if (tag === 'FAMS') {
                            individuals[currentEntity].families.push(value);
                        } else if (tag === 'FAMC') {
                            individuals[currentEntity].parentFamily = value;
                        }
                    } else if (currentType === 'FAM') {
                        if (tag === 'HUSB') {
                            families[currentEntity].husband = value;
                        } else if (tag === 'WIFE') {
                            families[currentEntity].wife = value;
                        } else if (tag === 'CHIL') {
                            families[currentEntity].children.push(value);
                        }
                    }
                } else if (level === 2 && currentEntity) {
                    if (tag === 'CONC') {
                        // Concatenate to current note without space
                        if (currentNote !== null) {
                            currentNote += value;
                        }
                    } else if (tag === 'CONT') {
                        // Continue with a new line
                        if (currentNote !== null) {
                            currentNote += ' ' + value;
                        }
                    } else if (currentType === 'INDI') {
                        if (tag === 'GIVN') {
                            individuals[currentEntity].givenName = value;
                        } else if (tag === 'SURN') {
                            individuals[currentEntity].surname = value;
                        } else if (currentTag === 'BIRT' && tag === 'DATE') {
                            individuals[currentEntity].birth.date = value;
                        } else if (currentTag === 'BIRT' && tag === 'PLAC') {
                            individuals[currentEntity].birth.place = value;
                        } else if (currentTag === 'DEAT' && tag === 'DATE') {
                            individuals[currentEntity].death.date = value;
                        } else if (currentTag === 'DEAT' && tag === 'PLAC') {
                            individuals[currentEntity].death.place = value;
                        }
                    }
                }
            }

            // Save any remaining note
            if (currentNote !== null && currentEntity && currentType === 'INDI') {
                let cleanNote = currentNote.replace(/<[^>]*>/g, ' ').replace(/&nbsp;/g, ' ').replace(/&ouml;/g, 'ö').replace(/&aring;/g, 'å').replace(/&auml;/g, 'ä').replace(/&Ouml;/g, 'Ö').replace(/&Aring;/g, 'Å').replace(/&Auml;/g, 'Ä').replace(/&ndash;/g, '–').replace(/&amp;/g, '&').trim();
                if (cleanNote) {
                    individuals[currentEntity].notes.push(cleanNote);
                }
            }

            // Store families info for later use
            window.gedcomFamilies = families;

            // Convert to array and sort by name
            allPersons = Object.values(individuals)
                .filter(p => p.name)
                .sort((a, b) => a.name.localeCompare(b.name));

            filteredPersons = allPersons;
            displayPersons();
        }

        function displayPersons() {
            const listElement = document.getElementById('personList');

            if (filteredPersons.length === 0) {
                listElement.innerHTML = '<div class="no-results">No persons found</div>';
                return;
            }

            const html = filteredPersons.map(person => {
                const birthInfo = person.birth.date || person.birth.place
                    ? `${person.birth.date} ${person.birth.place}`.trim()
                    : 'Unknown';

                const deathInfo = person.death.date || person.death.place
                    ? `${person.death.date} ${person.death.place}`.trim()
                    : '';

                const lifespan = deathInfo ? `${birthInfo} - ${deathInfo}` : `Born: ${birthInfo}`;

                const genderClass = person.sex ? `gender-${person.sex}` : '';

                const notesHtml = person.notes && person.notes.length > 0
                    ? `<div class="person-info" style="margin-top: 8px; font-style: italic; color: #555;">📝 ${person.notes[0].substring(0, 100)}${person.notes[0].length > 100 ? '...' : ''}</div>`
                    : '';

                return `
                    <div class="person-card" onclick="showDetail('${person.id}')">
                        <div class="person-name">
                            ${person.name}
                            ${person.sex ? `<span class="gender-icon ${genderClass}"></span>` : ''}
                        </div>
                        <div class="person-info">
                            ${lifespan}
                        </div>
                        ${notesHtml}
                    </div>
                `;
            }).join('');

            listElement.innerHTML = html;
        }

        function showDetail(personId) {
            const person = allPersons.find(p => p.id === personId);
            if (!person) return;

            let detailHTML = `
                <h2>${person.name}</h2>
                <div style="margin-top: 20px;">
                    <p><strong>Gender:</strong> ${person.sex === 'M' ? 'Male' : person.sex === 'F' ? 'Female' : 'Unknown'}</p>
                    ${person.birth.date ? `<p><strong>Birth Date:</strong> ${person.birth.date}</p>` : ''}
                    ${person.birth.place ? `<p><strong>Birth Place:</strong> ${person.birth.place}</p>` : ''}
                    ${person.death.date ? `<p><strong>Death Date:</strong> ${person.death.date}</p>` : ''}
                    ${person.death.place ? `<p><strong>Death Place:</strong> ${person.death.place}</p>` : ''}
            `;

            // Display notes if available
            if (person.notes && person.notes.length > 0) {
                detailHTML += '<h3 style="margin-top: 20px;">Notes:</h3>';
                person.notes.forEach(note => {
                    detailHTML += `<p style="background: #f5f5f5; padding: 10px; border-radius: 5px; margin: 10px 0;">${note}</p>`;
                });
            }

            // Get family information
            if (person.parentFamily && window.gedcomFamilies[person.parentFamily]) {
                const family = window.gedcomFamilies[person.parentFamily];
                detailHTML += '<h3 style="margin-top: 20px;">Parents:</h3>';

                if (family.husband) {
                    const father = allPersons.find(p => p.id === family.husband);
                    if (father) detailHTML += `<p>Father: ${father.name}</p>`;
                }

                if (family.wife) {
                    const mother = allPersons.find(p => p.id === family.wife);
                    if (mother) detailHTML += `<p>Mother: ${mother.name}</p>`;
                }
            }

            // Get spouse and children
            if (person.families && person.families.length > 0) {
                person.families.forEach(famId => {
                    const family = window.gedcomFamilies[famId];
                    if (family) {
                        detailHTML += '<h3 style="margin-top: 20px;">Family:</h3>';

                        const spouseId = person.sex === 'M' ? family.wife : family.husband;
                        if (spouseId) {
                            const spouse = allPersons.find(p => p.id === spouseId);
                            if (spouse) detailHTML += `<p>Spouse: ${spouse.name}</p>`;
                        }

                        if (family.children && family.children.length > 0) {
                            detailHTML += '<p><strong>Children:</strong></p><ul>';
                            family.children.forEach(childId => {
                                const child = allPersons.find(p => p.id === childId);
                                if (child) detailHTML += `<li>${child.name}</li>`;
                            });
                            detailHTML += '</ul>';
                        }
                    }
                });
            }

            detailHTML += '</div>';

            document.getElementById('detailBody').innerHTML = detailHTML;
            document.getElementById('detailModal').classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function (e) {
            const searchTerm = e.target.value.toLowerCase();

            if (searchTerm === '') {
                filteredPersons = allPersons;
            } else {
                filteredPersons = allPersons.filter(person =>
                    person.name.toLowerCase().includes(searchTerm) ||
                    person.givenName.toLowerCase().includes(searchTerm) ||
                    person.surname.toLowerCase().includes(searchTerm)
                );
            }

            displayPersons();
        });

        // Close modal on click outside
        document.getElementById('detailModal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeDetail();
            }
        });
    </script>
</body>

</html>
