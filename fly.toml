# fly.toml app configuration file generated for gedcom-viewer
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "gedcom-viewer"
primary_region = "arn"

[build]

[env]
  NODE_ENV = "production"

[mounts]
  source = "gedcom_data"
  destination = "/app/data"
  initial_size = "1gb"

[mounts]
  source = "gedcom_uploads"
  destination = "/app/uploads"
  initial_size = "3gb"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services]]
  http_checks = []
  internal_port = 3000
  processes = ["app"]
  protocol = "tcp"
  script_checks = []

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "1s"
    interval = "15s"
    restart_limit = 0
    timeout = "2s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
